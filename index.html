<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Reporte Seguimiento Lote 4</title>

<style>
    body{
        margin:0;
        font-family: 'Segoe UI', Tahoma, sans-serif;
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        color:#333;
    }

    header{
        background:#0d1b2a;
        padding:20px 40px;
        color:white;
        box-shadow:0 2px 8px rgba(0,0,0,0.3);
    }

    header h1{
        margin:0;
        font-weight:600;
        letter-spacing:0.5px;
    }

    .container{
        max-width:1400px;
        margin:40px auto;
        padding:0 20px;
    }

    .card{
        background:white;
        border-radius:16px;
        padding:25px;
        box-shadow:0 10px 30px rgba(0,0,0,0.15);
        transition:transform .2s;
    }

    .card:hover{
        transform:translateY(-3px);
    }

    .card-title{
        font-size:20px;
        font-weight:600;
        margin-bottom:15px;
        color:#1b263b;
    }

    iframe{
        width:100%;
        height:900px;
        border:none;
        border-radius:12px;
    }

    footer{
        text-align:center;
        color:#ddd;
        margin:40px 0 20px;
        font-size:14px;
    }

    .badge{
        display:inline-block;
        background:#00b4d8;
        color:white;
        padding:6px 12px;
        border-radius:20px;
        font-size:13px;
        margin-left:10px;
    }
</style>
</head>

<body>

<header>
    <h1>
        📊 Reporte Seguimiento Lote 4 
        <span class="badge">Power BI</span>
    </h1>
</header>

<div class="container">
    <div class="card">
        <div class="card-title">
            Tablero de Control Operativo
        </div>

        <iframe 
            title="Tablero_sucre"
            src="https://app.powerbi.com/view?r=eyJrIjoiNGYwYzBmNzctNzYzOS00MDVjLTg3NmItYzdiYTcwY2IxYWNlIiwidCI6ImQ1MTM4OGVmLTZhYjAtNDM2My05Zjk0LWQ1NjY0NGE0NTk3MCIsImMiOjR9"
            allowFullScreen="true">
        </iframe>

    </div>
</div>

<footer>
    Desarrollado por Gabriel González
</footer>

</body>
</html>
